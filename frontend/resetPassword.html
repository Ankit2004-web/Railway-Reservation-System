<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | RailYatra</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-single-column" style="position:relative">
            <button type="button" class="btn btn-icon" data-theme-toggle aria-label="Toggle theme" style="position:absolute;top:0;right:0"><i class="fas fa-moon"></i></button>
            <div class="logo-center">
                <img src="/assets/logo.png" alt="RailYatra">
                <h2>Reset Password</h2>
                <p class="auth-subtitle">Enter your new password below</p>
            </div>
            <form id="reset-form">
                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" class="form-control" minlength="6" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-control" minlength="6" required>
                </div>
                <div id="reset-error" class="error-message"></div>
                <div id="reset-success" class="success-message"></div>
                <button type="submit" class="btn btn-primary btn-block" id="reset-submit">Update Password</button>
            </form>
            <p class="auth-back-link"><a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a></p>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="js/config.js"></script>
    <script src="js/store.js"></script>
    <script src="js/mockData.js"></script>
    <script src="js/mockService.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Theme.init();
            const params = new URLSearchParams(window.location.search);
            const resetToken = params.get('token');

            document.getElementById('reset-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const password = document.getElementById('new-password').value;
                const confirm = document.getElementById('confirm-password').value;
                const errorEl = document.getElementById('reset-error');
                const successEl = document.getElementById('reset-success');
                const btn = document.getElementById('reset-submit');

                errorEl.textContent = '';
                successEl.textContent = '';

                if (!resetToken) {
                    errorEl.textContent = 'Invalid reset link.';
                    return;
                }
                if (password.length < 6) {
                    errorEl.textContent = 'Password must be at least 6 characters.';
                    return;
                }
                if (password !== confirm) {
                    errorEl.textContent = 'Passwords do not match.';
                    return;
                }

                btn.disabled = true;
                btn.classList.add('is-loading');
                try {
                    const data = await API.post('/auth/reset-password', { token: resetToken, password });
                    successEl.textContent = data.msg || 'Password updated successfully.';
                    UI.showToast('Password updated successfully', 'success');
                    document.getElementById('reset-form').reset();
                    setTimeout(() => { window.location.href = 'login.html'; }, 1500);
                } catch (err) {
                    errorEl.textContent = err.message || 'Reset failed';
                } finally {
                    btn.disabled = false;
                    btn.classList.remove('is-loading');
                }
            });
        });
    </script>
</body>
</html>
