<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Ticket | Railway Reservation</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/ticket.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="ticket-page-body">
    <header class="ticket-page-header no-print">
        <a href="index.html" class="site-brand"><img src="/assets/logo.png" alt="Railway" height="32"> Railway</a>
        <div class="ticket-page-actions">
            <button type="button" class="btn btn-outline btn-sm" id="ticket-print-btn"><i class="fas fa-print"></i> Print</button>
            <button type="button" class="btn btn-primary btn-sm" id="ticket-download-btn"><i class="fas fa-download"></i> Download</button>
            <a href="index.html" class="btn btn-ghost btn-sm"><i class="fas fa-arrow-left"></i> Back</a>
        </div>
    </header>
    <main id="ticket-container" class="ticket-container">
        <div class="skeleton skeleton-card" style="height:420px;max-width:800px;margin:40px auto"></div>
    </main>
    <script src="js/config.js"></script>
    <script src="js/store.js"></script>
    <script src="js/mockData.js"></script>
    <script src="js/mockService.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ticket.js"></script>
</body>
</html>
