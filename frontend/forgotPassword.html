<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | RailYatra</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page-body">
    <div class="auth-page">
        <div class="auth-single-column">
            <button type="button" class="btn btn-icon auth-theme-btn" data-theme-toggle aria-label="Toggle theme" style="position:absolute;top:16px;right:16px"><i class="fas fa-moon"></i></button>
            <div class="logo-center">
                <img src="/assets/logo.png" alt="RailYatra">
                <h2>Forgot Password</h2>
                <p class="auth-subtitle">Enter your registered email address.</p>
            </div>
            <form id="forgot-form">
                <div class="form-group">
                    <label for="forgot-email">Email Address</label>
                    <input type="email" id="forgot-email" class="form-control" required>
                </div>
                <div id="forgot-captcha" class="captcha-group form-group"></div>
                <div id="forgot-error" class="error-message"></div>
                <div id="forgot-success" class="success-message"></div>
                <button type="submit" class="btn btn-primary btn-block" id="forgot-submit">Send Reset Link</button>
            </form>
            <p class="auth-back-link"><a href="login.html"><i class="fas fa-arrow-left"></i> Return to Login</a></p>
        </div>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <script src="js/config.js"></script>
    <script src="js/store.js"></script>
    <script src="js/mockData.js"></script>
    <script src="js/mockService.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/captcha.js"></script>
    <script src="js/auth.js"></script>
    <script>document.addEventListener('DOMContentLoaded', () => { Theme.init(); AuthPages.initForgotPage(); });</script>
</body>
</html>
